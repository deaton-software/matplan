<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Weights — Mat Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161b22; --surface:#1f2630; --surface-raised:#262f3b; --line:#323d4a;
    --text:#e9e8e3; --text-dim:#9aa4b2; --accent:#e8a23d; --accent-dim:#8a6324;
    --us:#4f9e6b; --warn:#cf8a2e;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; padding-bottom:90px; }
  .shell{ max-width:560px; margin:0 auto; padding:24px 18px 30px; }

  header.top{ margin-bottom:6px; }
  .wordmark{ font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:.04em; font-size:1.05rem; text-transform:uppercase; color:var(--accent); }
  .wordmark span{ color:var(--text-dim); font-weight:500; }
  .subhead{ font-size:.8rem; color:var(--text-dim); margin:4px 0 16px; }

  .progress-banner{
    background:var(--surface-raised); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .progress-banner .label{ font-size:.78rem; color:var(--text-dim); }
  .progress-banner b{ color:var(--text); font-family:'JetBrains Mono'; }
  .bar-track{ flex:1; height:6px; background:var(--line); border-radius:3px; margin:0 10px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--us); transition:width .25s; }

  .w-card{
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px;
    transition:border-color .2s;
  }
  .w-card.confirmed{ border-color:var(--us); background:rgba(79,158,107,.06); }
  .w-card.scratched{ border-color:var(--line); opacity:.55; }
  .w-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .w-name{ font-family:'Inter'; font-weight:600; font-size:.92rem; }
  .w-range{ font-family:'JetBrains Mono'; font-size:.74rem; color:var(--text-dim); margin-top:2px; }
  .scratched-label{ font-size:.74rem; color:var(--text-dim); font-style:italic; }
  .unscratch-link{ font-size:.72rem; color:var(--accent); background:none; border:none; cursor:pointer; text-decoration:underline; }
  .scratch-btn{
    font-family:'Inter'; font-weight:600; font-size:.78rem; padding:7px 12px;
    border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--text-dim); cursor:pointer;
  }
  .scratch-btn:hover{ border-color:#b5403b; color:#e07d77; }
  .wt-select{
    background:var(--surface-raised); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'JetBrains Mono'; font-weight:600; font-size:.92rem; padding:7px 9px; cursor:pointer;
  }
  .wt-select:focus-visible{ outline:2px solid var(--accent); }

  .w-input-row{ display:flex; align-items:center; gap:8px; margin-top:9px; }
  .w-input-row input{
    width:74px; background:var(--surface-raised); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'JetBrains Mono'; font-weight:600; font-size:.95rem; padding:7px 9px; text-align:center;
  }
  .w-input-row input:focus-visible{ outline:2px solid var(--accent); }
  .lbs{ font-size:.72rem; color:var(--text-dim); }
  .confirm-btn{
    margin-left:auto; font-family:'Inter'; font-weight:600; font-size:.78rem; padding:7px 13px;
    border-radius:7px; border:1px solid var(--accent); background:var(--accent); color:#1a1305; cursor:pointer;
  }
  .confirm-btn:disabled{ opacity:.4; cursor:not-allowed; border-color:var(--line); background:var(--surface-raised); color:var(--text-dim); }

  .confirmed-summary{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .confirmed-summary .left{ display:flex; align-items:center; gap:10px; }
  .check{ color:var(--us); font-size:1.05rem; }
  .actual-wt{ font-family:'Oswald'; font-weight:700; font-size:1.2rem; color:var(--us); }
  .eligible{ font-size:.72rem; color:var(--text-dim); }
  .eligible b{ color:var(--text); }
  .edit-link{ font-size:.72rem; color:var(--accent); background:none; border:none; cursor:pointer; text-decoration:underline; }
  .new-range{ font-size:.68rem; color:var(--warn); margin-top:3px; }

  .bottom-bar{
    position:fixed; bottom:0; left:0; right:0; background:var(--surface-raised); border-top:1px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; z-index:40;
  }
  .bottom-bar .count{ font-size:.78rem; color:var(--text-dim); }
  .bottom-bar .count b{ color:var(--text); font-family:'JetBrains Mono'; }
  .btn{
    font-family:'Inter'; font-weight:600; font-size:.85rem; border-radius:8px; padding:10px 16px;
    border:1px solid var(--accent); background:var(--accent); color:#1a1305; cursor:pointer;
  }
  .btn:disabled{ opacity:.4; cursor:not-allowed; border-color:var(--line); background:var(--surface-raised); color:var(--text-dim); }
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="wordmark">MAT PLAN <span>· confirm weights</span></div>
  </header>
  <p class="subhead">Riverbend vs Eastview — scratch anyone not wrestling today, then confirm actual weight class for everyone else. Confirming collapses their range into a single class for this dual and going forward, until you reopen it.</p>

  <div class="progress-banner">
    <span class="label">Confirmed</span>
    <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    <span class="label"><b id="countLabel">0/5</b></span>
  </div>

  <div id="cardList"></div>

</div>

<div class="bottom-bar">
  <span class="count"><b id="bottomCount">0 of 5</b> confirmed</span>
  <button class="btn" id="finishBtn" disabled onclick="alert('Would take you to this dual\'s Plan Dual screen, now in final-analysis mode with confirmed weights + bump rule applied.')">Go to dual →</button>
</div>

<script>
let wrestlers = [
  {name:'Bo Sanderson', min:106, max:113, confirmedClass:null, scratched:false},
  {name:'Jordan Mackey', min:132, max:138, confirmedClass:null, scratched:false},
  {name:'Tate Whitfield', min:144, max:150, confirmedClass:null, scratched:false},
  {name:'Cole Renner', min:165, max:175, confirmedClass:null, scratched:false},
  {name:'Eli Patterson', min:190, max:215, confirmedClass:null, scratched:false},
];

const WEIGHTS = [106,113,120,126,132,138,144,150,157,165,175,190,215,285];

function weightsInRange(min, max){
  return WEIGHTS.filter(w => w >= min && w <= max);
}
function nextWeightUp(wt){
  const idx = WEIGHTS.indexOf(wt);
  return idx >= 0 && idx < WEIGHTS.length-1 ? WEIGHTS[idx+1] : wt;
}

function render(){
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  const active = wrestlers.filter(w => !w.scratched);
  let confirmedCount = active.filter(w => w.confirmedClass !== null).length;

  wrestlers.forEach((w, i) => {
    const card = document.createElement('div');

    if(w.scratched){
      card.className = 'w-card scratched';
      card.innerHTML = `
        <div class="w-row">
          <div>
            <div class="w-name">${w.name}</div>
            <div class="scratched-label">Scratched — not wrestling this dual</div>
          </div>
          <button class="unscratch-link" onclick="unscratch(${i})">Undo</button>
        </div>
      `;
    } else if(w.confirmedClass === null){
      const options = weightsInRange(w.min, w.max);
      card.className = 'w-card';
      card.innerHTML = `
        <div class="w-row">
          <div>
            <div class="w-name">${w.name}</div>
            <div class="w-range">Range: ${w.min}–${w.max}</div>
          </div>
        </div>
        <div class="w-input-row">
          <select class="wt-select" id="sel-${i}">
            ${options.map(o => `<option value="${o}">${o}</option>`).join('')}
          </select>
          <button class="scratch-btn" onclick="scratch(${i})">Scratch</button>
          <button class="confirm-btn" onclick="confirmWeight(${i})">Confirm</button>
        </div>
      `;
    } else {
      card.className = 'w-card confirmed';
      const bumpCls = nextWeightUp(w.confirmedClass);
      card.innerHTML = `
        <div class="confirmed-summary">
          <div class="left">
            <span class="check">✓</span>
            <div>
              <div class="w-name">${w.name}</div>
              <div class="eligible">Eligible at <b>${w.confirmedClass}</b> or bump to <b>${bumpCls}</b></div>
              <div class="new-range">Roster now set to ${w.confirmedClass} (no longer a range) — reopen anytime to widen it</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="actual-wt">${w.confirmedClass}</div>
            <button class="edit-link" onclick="editWeight(${i})">edit</button>
          </div>
        </div>
      `;
    }
    list.appendChild(card);
  });

  const pct = active.length ? Math.round((confirmedCount / active.length) * 100) : 0;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('countLabel').textContent = `${confirmedCount}/${active.length}`;
  document.getElementById('bottomCount').textContent = `${confirmedCount} of ${active.length}`;
  document.getElementById('finishBtn').disabled = confirmedCount === 0;
}

function confirmWeight(i){
  const select = document.getElementById('sel-' + i);
  wrestlers[i].confirmedClass = Number(select.value);
  render();
}
function editWeight(i){
  wrestlers[i].confirmedClass = null;
  render();
}
function scratch(i){
  wrestlers[i].scratched = true;
  render();
}
function unscratch(i){
  wrestlers[i].scratched = false;
  render();
}

render();
</script>
</body>
</html>
