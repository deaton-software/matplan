<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Dual — Mat Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161b22; --surface:#1f2630; --surface-raised:#262f3b; --line:#323d4a;
    --text:#e9e8e3; --text-dim:#9aa4b2; --accent:#e8a23d; --accent-dim:#8a6324;
    --us:#4f9e6b; --them:#b5403b; --star:#cf8a2e;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; padding-bottom:84px; }
  .shell{ max-width:760px; margin:0 auto; padding:24px 20px 40px; }

  header.top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:8px; }
  .wordmark{ font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:.04em; font-size:1.05rem; text-transform:uppercase; color:var(--accent); }
  .wordmark span{ color:var(--text-dim); font-weight:500; }

  /* scenario tabs */
  .scenario-bar{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
  .scenario-chip{
    flex:none; font-family:'Inter'; font-weight:600; font-size:.8rem; padding:8px 14px;
    border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--text-dim); cursor:pointer; white-space:nowrap;
  }
  .scenario-chip.active{ background:var(--surface-raised); border-color:var(--accent); color:var(--text); }
  .scenario-chip.add{ color:var(--accent); border-style:dashed; }

  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:14px; }

  .setup-row{ display:flex; gap:12px; flex-wrap:wrap; }
  .field{ flex:1; min-width:160px; }
  .field label{ font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); display:block; margin-bottom:5px; }
  .field select{
    width:100%; background:var(--surface-raised); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'JetBrains Mono'; font-weight:600; font-size:.88rem; padding:8px 9px; cursor:pointer;
  }
  .field select:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  /* matchup cards */
  .matchups{ display:flex; flex-direction:column; gap:8px; }
  .m-card{
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
  }
  .m-card.us-first{ border-left:3px solid var(--us); }
  .m-card.them-first{ border-left:3px solid var(--them); }
  .m-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .m-wt{ font-family:'Oswald'; font-weight:700; font-size:1.15rem; }
  .m-meta{ display:flex; align-items:center; gap:8px; }
  .tag{ font-family:'JetBrains Mono'; font-size:.62rem; font-weight:600; letter-spacing:.04em; padding:2px 7px; border-radius:5px; text-transform:uppercase; }
  .tag.us-tag{ background:rgba(79,158,107,.18); color:var(--us); border:1px solid var(--us); }
  .tag.them-tag{ background:rgba(181,64,59,.18); color:var(--them); border:1px solid var(--them); }
  .star-btn{ background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--line); line-height:1; padding:2px; }
  .star-btn.active{ color:var(--star); }

  .m-grid{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .m-select{ flex:1; min-width:130px; }
  .m-select select{
    width:100%; background:var(--surface-raised); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'Inter'; font-size:.85rem; padding:7px 8px; cursor:pointer;
  }
  .m-select.us select{ border-color:rgba(79,158,107,.5); }
  .m-select.them select{ border-color:rgba(181,64,59,.5); }
  .m-vs{ font-family:'Oswald'; font-size:.75rem; color:var(--text-dim); padding:0 2px; }

  .m-meta{ display:flex; align-items:center; gap:6px; margin-top:5px; font-size:.7rem; color:var(--text-dim); }
  .grade-chip{
    font-family:'JetBrains Mono'; font-weight:600; font-size:.66rem; padding:1px 6px;
    border-radius:4px; background:var(--surface-raised); border:1px solid var(--line); color:var(--text-dim);
  }
  .rating-chip{
    font-family:'JetBrains Mono'; font-weight:700; font-size:.66rem; padding:1px 6px;
    border-radius:4px; border:1px solid; line-height:1.4;
  }
  .rt-1{ background:rgba(107,114,128,.18); color:#9aa0aa; border-color:#6b7280; }
  .rt-1\.5,.rt-2{ background:rgba(91,138,114,.18); color:#7fb799; border-color:#5b8a72; }
  .rt-2\.5,.rt-3{ background:rgba(61,122,181,.18); color:#6fb0e6; border-color:#3d7ab5; }
  .rt-3\.5,.rt-4{ background:rgba(79,158,107,.18); color:#7fcf9c; border-color:#4f9e6b; }
  .rt-4\.5,.rt-5{ background:rgba(207,138,46,.18); color:#e8ab4f; border-color:#cf8a2e; }
  .rt-5\.5,.rt-6{ background:rgba(181,64,59,.18); color:#e07d77; border-color:#b5403b; }
  .rt-\?{ background:rgba(74,82,96,.25); color:var(--text-dim); border-color:var(--line); }

  .m-outcome{ display:flex; gap:8px; margin-top:9px; align-items:center; }
  .m-outcome select{
    flex:1; background:var(--surface-raised); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'Inter'; font-weight:500; font-size:.82rem; padding:7px 8px; cursor:pointer;
  }
  .pts{ font-family:'JetBrains Mono'; font-weight:600; font-size:.85rem; min-width:42px; text-align:right; }
  .pts.us{ color:var(--us); }
  .pts.them{ color:var(--them); }

  /* sticky score bar */
  .score-bar{
    position:fixed; bottom:0; left:0; right:0; background:var(--surface-raised); border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; gap:28px; padding:12px 16px; z-index:40;
  }
  .score-side{ text-align:center; }
  .score-side .name{ font-size:.65rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); }
  .score-side .num{ font-family:'Oswald'; font-weight:700; font-size:1.6rem; }
  .score-side.us .num{ color:var(--us); }
  .score-side.them .num{ color:var(--them); }
  .score-div{ color:var(--text-dim); font-family:'Oswald'; font-size:1.2rem; }

  .legend-row{ display:flex; gap:16px; margin:4px 2px 16px; font-size:.72rem; color:var(--text-dim); flex-wrap:wrap; }
  .legend-row i{ display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px; vertical-align:middle; }

  @media (max-width:600px){
    .shell{ padding:16px 12px 30px; }
    .m-grid{ flex-direction:column; align-items:stretch; }
    .m-vs{ align-self:center; }
  }
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="wordmark">MAT PLAN <span>· plan dual — Riverbend vs Eastview</span></div>
  </header>

  <div class="scenario-bar" id="scenarioBar"></div>

  <div class="panel">
    <div class="setup-row">
      <div class="field">
        <label>Starting weight class</label>
        <select id="startWeight" onchange="render()">
          <option>106</option><option>113</option><option>120</option><option>126</option>
          <option selected>132</option><option>138</option><option>144</option><option>150</option>
          <option>157</option><option>165</option><option>175</option><option>190</option>
          <option>215</option><option>285</option>
        </select>
      </div>
      <div class="field">
        <label>Coin toss — our call</label>
        <select id="parityCall" onchange="render()">
          <option value="odds">We report first on ODDS</option>
          <option value="evens">We report first on EVENS</option>
        </select>
      </div>
    </div>
  </div>

  <div class="legend-row">
    <span><i style="background:var(--us)"></i>We report first at this weight</span>
    <span><i style="background:var(--them)"></i>They report first at this weight</span>
    <span>★ — key match</span>
  </div>

  <div class="matchups" id="matchups"></div>

</div>

<div class="score-bar">
  <div class="score-side us"><div class="name">Riverbend</div><div class="num" id="usScore">0</div></div>
  <div class="score-div">–</div>
  <div class="score-side them"><div class="name">Eastview</div><div class="num" id="themScore">0</div></div>
</div>

<script>
const WEIGHTS = [106,113,120,126,132,138,144,150,157,165,175,190,215,285];

const ourRoster = {
  106:['Bo Sanderson'], 113:['Bo Sanderson'], 120:['—'], 126:['—'],
  132:['Jordan Mackey'], 138:['Jordan Mackey'], 144:['Tate Whitfield'],
  150:['Tate Whitfield'], 157:['—'], 165:['Cole Renner'], 175:['Cole Renner'],
  190:['Eli Patterson'], 215:['Eli Patterson'], 285:['—']
};
const theirRoster = {
  106:['Mason Reyes'], 113:['Mason Reyes'], 120:['Carter Voss'], 126:['Carter Voss'],
  132:['Dane Albright'], 138:['Dane Albright','Riggs Calhoun'], 144:['Riggs Calhoun'],
  150:['Wes Tannehill'], 157:['Wes Tannehill'], 165:['—'], 175:['Holt Brannigan'],
  190:['Holt Brannigan'], 215:['Sully Marsh'], 285:['Sully Marsh']
};

const ourInfo = {
  'Bo Sanderson':{grade:9, rating:'?'},
  'Jordan Mackey':{grade:10, rating:'4'},
  'Tate Whitfield':{grade:11, rating:'3'},
  'Cole Renner':{grade:12, rating:'5'},
  'Eli Patterson':{grade:11, rating:'2.5'},
};
const theirInfo = {
  'Mason Reyes':{grade:9, rating:'3'},
  'Carter Voss':{grade:10, rating:'2'},
  'Dane Albright':{grade:12, rating:'5'},
  'Riggs Calhoun':{grade:11, rating:'3.5'},
  'Wes Tannehill':{grade:12, rating:'4'},
  'Holt Brannigan':{grade:11, rating:'4.5'},
  'Sully Marsh':{grade:10, rating:'2.5'},
};
function ratingClass(r){ return 'rt-' + String(r).replace('.', '\\.'); }
function metaChip(side, name){
  const info = (side==='us' ? ourInfo : theirInfo)[name];
  if(!info) return '';
  return `<span class="grade-chip">Gr ${info.grade}</span><span class="rating-chip ${ratingClass(info.rating)}">${info.rating}</span>`;
}

const OUTCOMES = [
  {v:'us-pin', label:'We win — Pin/Forfeit', side:'us', pts:6},
  {v:'us-tech', label:'We win — Tech Fall', side:'us', pts:5},
  {v:'us-major', label:'We win — Major Dec.', side:'us', pts:4},
  {v:'us-dec', label:'We win — Decision', side:'us', pts:3},
  {v:'them-dec', label:'They win — Decision', side:'them', pts:3},
  {v:'them-major', label:'They win — Major Dec.', side:'them', pts:4},
  {v:'them-tech', label:'They win — Tech Fall', side:'them', pts:5},
  {v:'them-pin', label:'They win — Pin/Forfeit', side:'them', pts:6},
];

let scenarios = {
  'a': { name:'Base lineup', picks: defaultPicks() },
  'b': { name:'Bump 138→144', picks: defaultPicks() },
};
let activeScenario = 'a';

function defaultPicks(){
  const picks = {};
  WEIGHTS.forEach(w => { picks[w] = { our: ourRoster[w][0], their: theirRoster[w][0], outcome: 'us-dec', key:false }; });
  return picks;
}
// tweak scenario b to actually differ
scenarios.b.picks[138] = { our:'Tate Whitfield', their:'Dane Albright', outcome:'them-major', key:false };
scenarios.b.picks[144] = { our:'Jordan Mackey', their:'Riggs Calhoun', outcome:'us-dec', key:true };
scenarios.a.picks[165].key = true;
scenarios.a.picks[165].outcome = 'us-tech';

function renderScenarioBar(){
  const bar = document.getElementById('scenarioBar');
  bar.innerHTML = '';
  Object.keys(scenarios).forEach(id => {
    const chip = document.createElement('button');
    chip.className = 'scenario-chip' + (id===activeScenario ? ' active' : '');
    chip.textContent = scenarios[id].name;
    chip.onclick = () => { activeScenario = id; render(); };
    bar.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'scenario-chip add';
  add.textContent = '+ New scenario';
  add.onclick = () => {
    const id = 'id' + Date.now();
    scenarios[id] = { name:'Scenario ' + (Object.keys(scenarios).length+1), picks: defaultPicks() };
    activeScenario = id;
    render();
  };
  bar.appendChild(add);
}

function render(){
  renderScenarioBar();
  const start = Number(document.getElementById('startWeight').value);
  const call = document.getElementById('parityCall').value;
  const startIdx = WEIGHTS.indexOf(start);
  const order = [];
  for(let i=0;i<14;i++) order.push(WEIGHTS[(startIdx+i)%14]);

  const picks = scenarios[activeScenario].picks;
  const container = document.getElementById('matchups');
  container.innerHTML = '';
  let usTotal = 0, themTotal = 0;

  order.forEach((wt, idx) => {
    const position = idx+1;
    const isOdd = position % 2 === 1;
    const usFirst = (call==='odds' && isOdd) || (call==='evens' && !isOdd);
    const pick = picks[wt];
    const outcomeObj = OUTCOMES.find(o => o.v === pick.outcome);
    if(outcomeObj.side==='us') usTotal += outcomeObj.pts; else themTotal += outcomeObj.pts;

    const card = document.createElement('div');
    card.className = 'm-card ' + (usFirst ? 'us-first' : 'them-first');
    card.innerHTML = `
      <div class="m-top">
        <div class="m-meta">
          <div class="m-wt">${wt}</div>
          <span class="tag ${usFirst?'us-tag':'them-tag'}">${usFirst?'we report 1st':'they report 1st'}</span>
        </div>
        <button class="star-btn ${pick.key?'active':''}" onclick="toggleKey(${wt})">★</button>
      </div>
      <div class="m-grid">
        <div class="m-select us">
          <select onchange="setField(${wt},'our',this.value)">
            ${ourRoster[wt].map(n=>`<option ${n===pick.our?'selected':''}>${n}</option>`).join('')}
          </select>
          <div class="m-meta">${metaChip('us', pick.our)}</div>
        </div>
        <div class="m-vs">vs</div>
        <div class="m-select them">
          <select onchange="setField(${wt},'their',this.value)">
            ${theirRoster[wt].map(n=>`<option ${n===pick.their?'selected':''}>${n}</option>`).join('')}
          </select>
          <div class="m-meta">${metaChip('them', pick.their)}</div>
        </div>
      </div>
      <div class="m-outcome">
        <select onchange="setField(${wt},'outcome',this.value)">
          ${OUTCOMES.map(o=>`<option value="${o.v}" ${o.v===pick.outcome?'selected':''}>${o.label}</option>`).join('')}
        </select>
        <div class="pts ${outcomeObj.side}">${outcomeObj.side==='us'?'+':''}${outcomeObj.side==='us'?outcomeObj.pts:'-'+outcomeObj.pts}</div>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('usScore').textContent = usTotal;
  document.getElementById('themScore').textContent = themTotal;
}

function setField(wt, key, val){
  scenarios[activeScenario].picks[wt][key] = val;
  render();
}
function toggleKey(wt){
  scenarios[activeScenario].picks[wt].key = !scenarios[activeScenario].picks[wt].key;
  render();
}

render();
</script>
</body>
</html>
