<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mat Plan — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161b22; --surface:#1f2630; --surface-raised:#262f3b; --line:#323d4a;
    --text:#e9e8e3; --text-dim:#9aa4b2; --accent:#e8a23d; --accent-dim:#8a6324; --us:#4f9e6b;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .shell{ max-width:640px; margin:0 auto; padding:28px 20px 60px; }

  header.top{ margin-bottom:24px; }
  .wordmark{ font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:.04em; font-size:1.3rem; text-transform:uppercase; color:var(--accent); }
  .wordmark span{ color:var(--text-dim); font-weight:500; font-size:.95rem; display:block; margin-top:2px; letter-spacing:.01em; text-transform:none; }

  .section{ margin-bottom:30px; }
  .section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .section-head h2{ font-family:'Oswald'; font-size:1.05rem; letter-spacing:.01em; margin:0; }
  .add-btn{
    font-family:'Inter'; font-weight:600; font-size:.78rem; padding:7px 13px; border-radius:7px;
    border:1px solid var(--accent); background:transparent; color:var(--accent); cursor:pointer;
  }
  .add-btn:hover{ background:rgba(232,162,61,.1); }

  .card-list{ display:flex; flex-direction:column; gap:8px; }
  .item-card{
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 15px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; transition:border-color .15s;
  }
  .item-card:hover{ border-color:var(--accent-dim); }

  .dual-info .matchup{ font-family:'Oswald'; font-weight:600; font-size:1rem; }
  .dual-info .matchup .us{ color:var(--us); }
  .dual-info .meta{ font-size:.74rem; color:var(--text-dim); margin-top:3px; }
  .status-pill{
    font-family:'JetBrains Mono'; font-size:.64rem; font-weight:600; letter-spacing:.04em;
    padding:3px 8px; border-radius:5px; text-transform:uppercase; white-space:nowrap;
  }
  .status-planning{ background:rgba(232,162,61,.15); color:var(--accent); border:1px solid var(--accent-dim); }
  .status-weighed{ background:rgba(79,158,107,.15); color:var(--us); border:1px solid var(--us); }

  .roster-info .tname{ font-family:'Oswald'; font-weight:600; font-size:1rem; }
  .roster-info .meta{ font-size:.74rem; color:var(--text-dim); margin-top:3px; }
  .chevron{ color:var(--text-dim); font-size:1.1rem; }

  .inline-form{
    background:var(--surface-raised); border:1px solid var(--line); border-radius:10px; padding:14px 15px;
    margin-bottom:8px; display:none; flex-direction:column; gap:10px;
  }
  .inline-form.open{ display:flex; }
  .inline-form .row{ display:flex; gap:8px; flex-wrap:wrap; }
  .inline-form label{ font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); display:block; margin-bottom:5px; }
  .inline-form select, .inline-form input{
    width:100%; background:var(--surface); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-family:'Inter'; font-size:.85rem; padding:8px 9px;
  }
  .inline-form .field{ flex:1; min-width:130px; }
  .form-actions{ display:flex; justify-content:flex-end; gap:8px; }
  .btn-sm{
    font-family:'Inter'; font-weight:600; font-size:.78rem; padding:7px 13px; border-radius:7px; cursor:pointer;
  }
  .btn-sm.ghost{ background:transparent; border:1px solid var(--line); color:var(--text-dim); }
  .btn-sm.primary{ background:var(--accent); border:1px solid var(--accent); color:#1a1305; }
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="wordmark">MAT PLAN<span>Riverbend Wrestling</span></div>
  </header>

  <div class="section">
    <div class="section-head">
      <h2>Duals</h2>
      <button class="add-btn" onclick="toggleForm('dualForm')">+ New dual</button>
    </div>

    <div class="inline-form" id="dualForm">
      <div class="row">
        <div class="field">
          <label>Opponent</label>
          <select id="newDualOpp">
            <option>Pisgah Christian</option>
            <option>Mcnair</option>
            <option>Fellowship Christian</option>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="newDualDate">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-sm ghost" onclick="toggleForm('dualForm')">Cancel</button>
        <button class="btn-sm primary" onclick="addDual()">Create dual</button>
      </div>
    </div>

    <div class="card-list" id="dualList"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <h2>Rosters</h2>
      <button class="add-btn" onclick="toggleForm('rosterForm')">+ New roster</button>
    </div>

    <div class="inline-form" id="rosterForm">
      <div class="row">
        <div class="field">
          <label>Team name</label>
          <input type="text" id="newRosterName" placeholder="e.g. Wesleyan">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-sm ghost" onclick="toggleForm('rosterForm')">Cancel</button>
        <button class="btn-sm primary" onclick="addRoster()">Create roster</button>
      </div>
    </div>

    <div class="card-list" id="rosterList"></div>
  </div>

</div>

<script>
let duals = [
  {opp:'Eastview HS', date:'Jan 14', status:'weighed'},
  {opp:'Pisgah Christian', date:'Jan 21', status:'planning'},
  {opp:'Mcnair', date:'Jan 28', status:'planning'},
];
let rosters = [
  {name:'Riverbend HS (ours)', count:24},
  {name:'Eastview HS', count:21},
  {name:'Lakeside Wesleyan', count:18},
];

function renderDuals(){
  const list = document.getElementById('dualList');
  list.innerHTML = '';
  duals.forEach(d => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.onclick = () => alert('Would open the Plan Dual screen for Riverbend vs ' + d.opp + '.');
    card.innerHTML = `
      <div class="dual-info">
        <div class="matchup"><span class="us">Riverbend</span> vs ${d.opp}</div>
        <div class="meta">${d.date}</div>
      </div>
      <span class="status-pill status-${d.status}">${d.status === 'weighed' ? 'Weighed in' : 'Planning'}</span>
    `;
    list.appendChild(card);
  });
}
function renderRosters(){
  const list = document.getElementById('rosterList');
  list.innerHTML = '';
  rosters.forEach(r => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.onclick = () => alert('Would open the Roster screen for ' + r.name + '.');
    card.innerHTML = `
      <div class="roster-info">
        <div class="tname">${r.name}</div>
        <div class="meta">${r.count} wrestlers</div>
      </div>
      <span class="chevron">›</span>
    `;
    list.appendChild(card);
  });
}

function toggleForm(id){
  document.getElementById(id).classList.toggle('open');
}
function addDual(){
  const opp = document.getElementById('newDualOpp').value;
  const dateRaw = document.getElementById('newDualDate').value;
  const date = dateRaw ? new Date(dateRaw).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'TBD';
  duals.push({opp, date, status:'planning'});
  toggleForm('dualForm');
  renderDuals();
}
function addRoster(){
  const name = document.getElementById('newRosterName').value.trim();
  if(!name) return;
  rosters.push({name, count:0});
  document.getElementById('newRosterName').value = '';
  toggleForm('rosterForm');
  renderRosters();
}

renderDuals();
renderRosters();
</script>
</body>
</html>
